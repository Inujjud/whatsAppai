# إعداد البناء على Railway (Nixpacks)
[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r server/requirements.txt"
]

[start]
cmd = ". /opt/venv/bin/activate && gunicorn app:app --chdir server --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
