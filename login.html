<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تسجيل الدخول — واتس بوت</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0D1117; --card:#161B22; --border:#21262D; --input:#0D1117;
    --text:#E6EDF3; --muted:#8B949E; --accent:#F78166; --accent-2:#FF9776;
    --radius:12px; --err:#F85149; --ok:#3FB950;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
  body{background:var(--bg);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:20px}
  body::before{content:"";position:fixed;inset:0;
    background:radial-gradient(circle at 50% 0%,rgba(247,129,102,.10),transparent 55%);pointer-events:none}
  .wrap{width:100%;max-width:420px;position:relative;z-index:1}
  .logo{display:flex;align-items:center;justify-content:center;gap:10px;font-weight:900;font-size:22px;margin-bottom:26px}
  .logo .dot{width:36px;height:36px;border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));display:grid;place-items:center;font-size:20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px}
  .tabs{display:flex;background:var(--input);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:24px}
  .tab{flex:1;text-align:center;padding:10px;border-radius:7px;cursor:pointer;font-weight:700;color:var(--muted);transition:.2s}
  .tab.active{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#1a1207}
  h1{font-size:22px;margin-bottom:6px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:22px}
  .field{margin-bottom:16px}
  label{display:block;font-size:14px;font-weight:500;margin-bottom:7px}
  input,select{width:100%;padding:12px 14px;background:var(--input);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-size:15px;transition:.2s}
  input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(247,129,102,.15)}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#1a1207;transition:.2s;margin-top:6px}
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(247,129,102,.3)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
  .msg{padding:12px 14px;border-radius:10px;font-size:14px;margin-bottom:16px;display:none}
  .msg.err{display:block;background:rgba(248,81,73,.12);color:var(--err);border:1px solid rgba(248,81,73,.3)}
  .msg.ok{display:block;background:rgba(63,185,80,.12);color:var(--ok);border:1px solid rgba(63,185,80,.3)}
  .hide{display:none}
  .back{text-align:center;margin-top:18px}
  .back a{color:var(--muted);font-size:14px;text-decoration:none}
  .back a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <a href="/" class="logo" style="text-decoration:none;color:inherit"><span class="dot">💬</span> واتس بوت</a>
  <div class="card">
    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">تسجيل الدخول</div>
      <div class="tab" id="tabSignup" onclick="switchTab('signup')">حساب جديد</div>
    </div>

    <div id="msg" class="msg"></div>

    <!-- Login -->
    <form id="loginForm" onsubmit="return doLogin(event)">
      <h1>مرحباً بعودتك 👋</h1>
      <p class="sub">سجّل الدخول لإدارة بوت نشاطك.</p>
      <div class="field"><label>البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required /></div>
      <div class="field"><label>كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required /></div>
      <button class="btn" type="submit" id="loginBtn">دخول</button>
    </form>

    <!-- Signup -->
    <form id="signupForm" class="hide" onsubmit="return doSignup(event)">
      <h1>أنشئ حسابك 🚀</h1>
      <p class="sub">ابدأ تجربتك المجانية في دقيقة.</p>
      <div class="field"><label>اسم النشاط</label>
        <input type="text" id="suName" placeholder="مطعم سلمى" required /></div>
      <div class="field"><label>نوع النشاط</label>
        <select id="suType">
          <option value="مطعم">مطعم</option>
          <option value="صالون">صالون</option>
          <option value="عيادة">عيادة</option>
          <option value="محل">محل</option>
          <option value="أخرى">أخرى</option>
        </select></div>
      <div class="field"><label>البريد الإلكتروني</label>
        <input type="email" id="suEmail" placeholder="you@example.com" required /></div>
      <div class="field"><label>كلمة المرور</label>
        <input type="password" id="suPassword" placeholder="6 أحرف على الأقل" required /></div>
      <button class="btn" type="submit" id="signupBtn">إنشاء الحساب</button>
    </form>
  </div>
  <div class="back"><a href="/">← الرجوع للصفحة الرئيسية</a></div>
</div>

<script>
const API = ""; // نفس الأصل (السيرفر يقدّم الصفحات والـ API)

function showMsg(text, type){
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
}
function clearMsg(){ document.getElementById('msg').className = 'msg'; }

function switchTab(which){
  clearMsg();
  const login = which === 'login';
  document.getElementById('tabLogin').classList.toggle('active', login);
  document.getElementById('tabSignup').classList.toggle('active', !login);
  document.getElementById('loginForm').classList.toggle('hide', !login);
  document.getElementById('signupForm').classList.toggle('hide', login);
}

// فتح تبويب التسجيل عبر #signup
if (location.hash === '#signup') switchTab('signup');

function saveSession(clientId, businessName){
  localStorage.setItem('client_id', clientId);
  if (businessName) localStorage.setItem('business_name', businessName);
}

async function doLogin(e){
  e.preventDefault();
  clearMsg();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'جارٍ الدخول...';
  try{
    const res = await fetch(API + '/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value
      })
    });
    const data = await res.json();
    if (res.ok && data.success){
      saveSession(data.client_id, data.business_name);
      window.location.href = '/dashboard.html';
    } else {
      showMsg(data.error || 'تعذّر تسجيل الدخول', 'err');
    }
  }catch(err){
    showMsg('خطأ في الاتصال بالخادم. حاول مرة أخرى.', 'err');
  }finally{
    btn.disabled = false; btn.textContent = 'دخول';
  }
  return false;
}

async function doSignup(e){
  e.preventDefault();
  clearMsg();
  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'جارٍ الإنشاء...';
  try{
    const res = await fetch(API + '/api/signup', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        business_name: document.getElementById('suName').value,
        business_type: document.getElementById('suType').value,
        email: document.getElementById('suEmail').value,
        password: document.getElementById('suPassword').value
      })
    });
    const data = await res.json();
    if (res.ok && data.success){
      saveSession(data.client_id, document.getElementById('suName').value);
      window.location.href = '/dashboard.html';
    } else {
      showMsg(data.error || 'تعذّر إنشاء الحساب', 'err');
    }
  }catch(err){
    showMsg('خطأ في الاتصال بالخادم. حاول مرة أخرى.', 'err');
  }finally{
    btn.disabled = false; btn.textContent = 'إنشاء الحساب';
  }
  return false;
}
</script>
</body>
</html>
